name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Verify source files exist
        run: |
          test -f app/src/main/java/com/islandyout/tapforge/MainActivity.kt || { echo "MISSING MainActivity.kt"; exit 1; }
          test -f app/src/main/java/com/islandyout/tapforge/ClickerService.kt || { echo "MISSING ClickerService.kt"; exit 1; }

      - name: Build debug APK
        run: |
          find . -path "*/src/main/res/*" -type f ! -name "*.xml" ! -name "*.png" ! -name "*.webp" ! -name "*.jpg" -delete
          rm -rf app/src/main/res/XML
          cd "$(dirname "$(find . -name settings.gradle.kts | head -1)")"
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TapForge-debug-apk
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
